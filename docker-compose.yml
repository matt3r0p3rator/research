name: trilium
services:
  trilium:
    image: triliumnext/trilium:latest
    container_name: trilium_server
    restart: unless-stopped
    ports:
      - '${PORT:-8080}:8080'
    environment:
      - TRILIUM_DATA_DIR=/home/node/trilium-data
    volumes:
      # Persistent Trilium database and config
      - ${TRILIUM_DATA_DIR:-~/trilium-data}:/home/node/trilium-data
      # Research folders mounted read-only for import
      - ./charts:/research/charts:ro
      - ./chem:/research/chem:ro
      - ./cloud-chamber:/research/cloud-chamber:ro
      - ./crypto:/research/crypto:ro
      - ./refrigeration:/research/refrigeration:ro
      - ./school-search:/research/school-search:ro
