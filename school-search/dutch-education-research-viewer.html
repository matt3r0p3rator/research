    <script>
        // Simple Markdown Parser
        function parseMarkdown(markdown) {
            let html = markdown;
            
            // Headers
            html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
            html = html.replace(/^#### (.*$)/gim, '<h4>$1</h4>');
            
            // Bold
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            // Italic
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            
            // Code blocks
            html = html.replace(/```([^`]*)```/g, '<pre><code>$1</code></pre>');
            
            // Inline code
            html = html.replace(/`([^`]*)`/g, '<code>$1</code>');
            
            // Links
            html = html.replace(/\[([^\]]*)\]\(([^)]*)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
            
            // Lists
            html = html.replace(/^\* (.*)$/gim, '<li>$1</li>');
            html = html.replace(/^\- (.*)$/gim, '<li>$1</li>');
            html = html.replace(/^(\d+)\. (.*)$/gim, '<li>$2</li>');
            
            // Wrap consecutive list items in ul tags
            html = html.replace(/(<li>.*<\/li>)/gs, function(match) {
                if (match.includes('<li>') && !match.includes('<ul>')) {
                    return '<ul>' + match + '</ul>';
                }
                return match;
            });
            
            // Blockquotes
            html = html.replace(/^> (.*)$/gim, '<blockquote>$1</blockquote>');
            
            // Line breaks
            html = html.replace(/\n\n/g, '</p><p>');
            html = html.replace(/\n/g, '<br>');
            
            // Wrap content in paragraphs
            html = '<p>' + html + '</p>';
            
            // Clean up empty paragraphs
            html = html.replace(/<p><\/p>/g, '');
            html = html.replace(/<p>(<h[1-6])/g, '$1');
            html = html.replace(/(<\/h[1-6]>)<\/p>/g, '$1');
            html = html.replace(/<p>(<ul)/g, '$1');
            html = html.replace(/(<\/ul>)<\/p>/g, '$1');
            html = html.replace(/<p>(<blockquote)/g, '$1');
            html = html.replace(/(<\/blockquote>)<\/p>/g, '$1');
            html = html.replace(/<p>(<pre)/g, '$1');
            html = html.replace(/(<\/pre>)<\/p>/g, '$1');
            
            return html;
        }

        // Generate table of contents from headers
        function generateTOC(content) {
            const headers = content.match(/<h[1-4][^>]*>([^<]+)<\/h[1-4]>/g);
            if (!headers || headers.length === 0) return '';
            
            let toc = '<div class="toc"><h4>📋 Table of Contents</h4><ul>';
            headers.forEach((header, index) => {
                const level = header.match(/<h([1-4])/)[1];
                const text = header.match(/>([^<]+)</)[1];
                const id = `header-${index}`;
                const indent = level > 2 ? 'margin-left: 1rem;' : '';
                toc += `<li style="${indent}"><a href="#${id}" onclick="scrollToHeader('${id}')">${text}</a></li>`;
            });
            toc += '</ul></div>';
            
            return toc;
        }

        // Scroll to header function
        function scrollToHeader(id) {
            const element = document.getElementById(id);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth' });
            }
        }

        // Add IDs to headers for navigation
        function addHeaderIds(content) {
            let headerIndex = 0;
            return content.replace(/<h([1-4])([^>]*)>([^<]+)<\/h[1-4]>/g, function(match, level, attrs, text) {
                const id = `header-${headerIndex++}`;
                return `<h${level}${attrs} id="${id}">${text}</h${level}>`;
            });
        }

        // Load and display a file
        async function loadFile(filename) {
            const contentDiv = document.getElementById('markdownContent');
            const titleDiv = document.getElementById('contentTitle');
            
            // Update active file in sidebar
            document.querySelectorAll('.file-list a').forEach(a => a.classList.remove('active'));
            document.querySelector(`[data-file="${filename}"]`).classList.add('active');
            
            // Show loading
            contentDiv.innerHTML = '<div class="loading">Loading...</div>';
            
            try {
                // Since we can't actually fetch files, we'll show a template
                const file = files.find(f => f.name === filename);
                titleDiv.textContent = file.title;
                
                const content = getFileContent(filename);
                const parsed = parseMarkdown(content);
                const withIds = addHeaderIds(parsed);
                const toc = generateTOC(withIds);
                
                contentDiv.innerHTML = toc + withIds;
            } catch (error) {
                contentDiv.innerHTML = `
                    <div style="text-align: center; padding: 2rem; color: #ef4444;">

                            <li>✅ Responsive design</li>
                            <li>✅ Offline functionality</li>
